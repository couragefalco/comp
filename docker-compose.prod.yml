x-logging: &default-logging
  driver: json-file
  options:
    max-size: '10m'
    max-file: '5'
    compress: 'true'

services:
  comp-db:
    image: postgres:16
    volumes:
      - comp_db_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: comp
      POSTGRES_USER: comp
      POSTGRES_PASSWORD: ${COMP_DB_PASSWORD}
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U comp -h localhost -d comp']
      interval: 5s
      timeout: 5s
      retries: 10
    restart: always
    networks:
      - comp-internal
    logging: *default-logging

  comp-app:
    image: ghcr.io/couragefalco/comp/app:latest
    env_file: .env.app
    ports:
      - '3100:3000'
    depends_on:
      comp-db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:3000/api/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - comp-internal
    logging: *default-logging

  comp-portal:
    image: ghcr.io/couragefalco/comp/portal:latest
    env_file: .env.portal
    ports:
      - '3200:3000'
    depends_on:
      comp-db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:3000/ || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - comp-internal
    logging: *default-logging

networks:
  comp-internal:
    name: comp-internal

volumes:
  comp_db_data:
