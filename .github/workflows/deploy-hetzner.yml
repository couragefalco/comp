name: Deploy to Hetzner

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push app image
        run: |
          docker build \
            --target app \
            --build-arg NEXT_PUBLIC_BETTER_AUTH_URL=https://compliance.ultrarelevant.com \
            --build-arg NEXT_PUBLIC_PORTAL_URL=https://portal.ultrarelevant.com \
            --build-arg NEXT_PUBLIC_API_URL=https://compliance.ultrarelevant.com/api \
            -t ghcr.io/couragefalco/comp/app:latest \
            -t ghcr.io/couragefalco/comp/app:${{ github.sha }} \
            --push .

      - name: Build and push portal image
        run: |
          docker build \
            --target portal \
            --build-arg NEXT_PUBLIC_BETTER_AUTH_URL=https://portal.ultrarelevant.com \
            -t ghcr.io/couragefalco/comp/portal:latest \
            -t ghcr.io/couragefalco/comp/portal:${{ github.sha }} \
            --push .

      - name: Build and push migrator image
        run: |
          docker build \
            --target migrator \
            -t ghcr.io/couragefalco/comp/migrator:latest \
            --push .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/comp
            # Pull latest images (public repo, no auth needed)
            docker compose -f docker-compose.prod.yml pull comp-app comp-portal
            docker pull ghcr.io/couragefalco/comp/migrator:latest
            # Run migrations
            docker run --rm --network comp-internal \
              -e DATABASE_URL=postgresql://comp:${{ secrets.COMP_DB_PASSWORD }}@comp-db:5432/comp \
              ghcr.io/couragefalco/comp/migrator:latest
            # Restart services
            docker compose -f docker-compose.prod.yml up -d comp-app comp-portal
            # Cleanup old images
            docker image prune -f
